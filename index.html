<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>LV One Stop - 拉斯維加斯旅遊一站式服務</title>
</head>
<body class="bg-gray-50 text-gray-900">
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">LV One Stop</h1>
            <div class="space-x-4 text-sm font-medium">
                <a href="#stays" class="hover:text-blue-500">住宿</a>
                <a href="#tours" class="hover:text-blue-500">旅遊/包車</a>
            </div>
        </div>
    </nav>

    <header class="bg-blue-600 py-16 px-4 text-center text-white">
        <h2 class="text-4xl font-extrabold mb-4">拉斯維加斯優質華人服務</h2>
        <p class="text-lg opacity-90">房源住宿 · 包車接送 · 定制旅遊</p>
    </header>

    <section id="stays" class="max-w-6xl mx-auto py-12 px-4">
        <h3 class="text-2xl font-bold mb-8 border-l-4 border-blue-600 pl-3">精選房源</h3>
        <div class="grid md:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl shadow p-4">
                <h4 class="font-bold mb-2">太空艙 (Pod Space)</h4>
                <a href="https://airbnb.com/h/pod1space" target="_blank" class="text-blue-500 text-sm">點擊查看照片 →</a>
            </div>
            <div class="bg-white rounded-xl shadow p-4">
                <h4 class="font-bold mb-2">全新現代風獨立小屋</h4>
                <a href="https://www.airbnb.com/rooms/1231644755106173516" target="_blank" class="text-blue-500 text-sm">點擊查看照片 →</a>
            </div>
            <div class="bg-white rounded-xl shadow p-4">
                <h4 class="font-bold mb-2">豪華主臥 (Master Room)</h4>
                <a href="https://airbnb.com/h/lv-masterroomcy" target="_blank" class="text-blue-500 text-sm">點擊查看照片 →</a>
            </div>
            <div class="bg-white rounded-xl shadow p-4">
                <h4 class="font-bold mb-2">King Room</h4>
                <a href="https://airbnb.com/h/kingroom1-elpaque" target="_blank" class="text-blue-500 text-sm">點擊查看照片 →</a>
            </div>
            <div class="bg-white rounded-xl shadow p-4">
                <h4 class="font-bold mb-2">Queen Room 1 & 2</h4>
                <a href="https://airbnb.com/h/queenroom-1" target="_blank" class="text-blue-500 text-sm">查看 Queen 1</a> | 
                <a href="https://airbnb.com/h/queenroom-2" target="_blank" class="text-blue-500 text-sm">查看 Queen 2</a>
            </div>
        </div>
    </section>

    <section id="tours" class="bg-gray-100 py-12 px-4 text-center">
        <h3 class="text-2xl font-bold mb-4">包車與定制旅遊</h3>
        <p class="text-gray-600 mb-6">2024 Toyota Sienna 新車接送 | 大峽谷、羚羊谷專線</p>
        <div class="bg-blue-600 text-white inline-block px-8 py-3 rounded-full font-bold">聯繫我們預訂</div>
    </section>

    <footer class="py-8 text-center text-gray-400 text-xs">
        © 2026 LV One Stop. All rights reserved.
    </footer>
</body>
</html>
