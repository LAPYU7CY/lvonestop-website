<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .category-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .category-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .hero-gradient {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1581351123004-757df051db8e?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
    <title>LV One Stop - 拉斯維加斯旅遊一站式服務</title>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="hero-gradient py-24 px-4 text-center text-white">
        <h2 class="text-4xl md:text-6xl font-extrabold mb-4 text-yellow-400">LV One Stop</h2>
        <p class="text-xl md:text-2xl opacity-90 font-light">拉斯維加斯優質華人住宿 · 包車 · 旅遊</p>
    </header>

    <section id="stays" class="max-w-6xl mx-auto py-16 px-4">
        <h3 class="text-3xl font-bold mb-10 text-center">精選住宿 (Stay)</h3>
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="category-card bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                <div class="h-52 bg-gray-200 bg-cover bg-center" style="background-image: url('你太空艙的照片連結')"></div>
                <div class="p-6 text-center">
                    <h4 class="font-bold text-xl mb-2">太空艙 Pod Space</h4>
                    <p class="text-gray-500 text-sm mb-4">未來感體驗 · 極致私密 · 獨特選擇</p>
                    <a href="https://airbnb.com/h/pod1space" target="_blank" class="inline-block bg-gray-900 text-white px-6 py-2 rounded-full">查看詳情</a>
                </div>
            </div>

            <div class="category-card bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                <div class="h-52 bg-gray-200 bg-cover bg-center" style="background-image: url('你獨立小屋的照片連結')"></div>
                <div class="p-6 text-center">
                    <h4 class="font-bold text-xl mb-2">現代風獨立小屋</h4>
                    <p class="text-gray-500 text-sm mb-4">全新裝修 · 私人空間 · 採光極佳</p>
                    <a href="https://www.airbnb.com/rooms/1231644755106173516" target="_blank" class="inline-block bg-gray-900 text-white px-6 py-2 rounded-full">查看詳情</a>
                </div>
            </div>

            <div class="category-card bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                <div class="h-52 bg-gray-200 bg-cover bg-center" style="background-image: url('你Sienna的照片連結')"></div>
                <div class="p-6 text-center">
                    <h4 class="font-bold text-xl mb-2">2024 Toyota Sienna</h4>
                    <p class="text-gray-500 text-sm mb-4">24h接送 · 深度遊 · 專業司機</p>
                    <div class="bg-blue-600 text-white px-6 py-2 rounded-full cursor-pointer">聯繫預訂</div>
                </div>
            </div>

        </div>
    </section>

    <footer class="py-12 text-center text-gray-400 text-sm">
        <p>© 2026 LV One Stop | 你的拉斯維加斯一站式管家</p>
    </footer>

</body>
</html>
